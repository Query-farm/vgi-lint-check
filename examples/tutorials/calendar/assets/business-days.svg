<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 150" role="img" aria-label="A week with weekends and a holiday shaded out, leaving business days highlighted">
  <style>
    .lbl { font: 600 13px -apple-system, "Segoe UI", Roboto, sans-serif; fill: #6b7280; }
    .day { font: 700 20px -apple-system, "Segoe UI", Roboto, sans-serif; }
    .biz  { fill: #3b6fed; }
    .off  { fill: #cbd5e1; }
    .tag  { font: 600 10px -apple-system, sans-serif; fill: #9aa4b2; }
  </style>
  <g transform="translate(10,20)">
    <!-- Mon..Sun columns -->
    <g>
      <text class="lbl" x="30"  y="12" text-anchor="middle">Mon</text>
      <text class="lbl" x="105" y="12" text-anchor="middle">Tue</text>
      <text class="lbl" x="180" y="12" text-anchor="middle">Wed</text>
      <text class="lbl" x="255" y="12" text-anchor="middle">Thu</text>
      <text class="lbl" x="330" y="12" text-anchor="middle">Fri</text>
      <text class="lbl" x="405" y="12" text-anchor="middle">Sat</text>
      <text class="lbl" x="480" y="12" text-anchor="middle">Sun</text>
    </g>
    <!-- cells -->
    <g transform="translate(0,26)">
      <rect x="2"   y="0" width="56" height="56" rx="10" fill="#eef2ff"/>
      <rect x="77"  y="0" width="56" height="56" rx="10" fill="#eef2ff"/>
      <rect x="152" y="0" width="56" height="56" rx="10" fill="#f1f5f9"/>
      <rect x="227" y="0" width="56" height="56" rx="10" fill="#eef2ff"/>
      <rect x="302" y="0" width="56" height="56" rx="10" fill="#eef2ff"/>
      <rect x="377" y="0" width="56" height="56" rx="10" fill="#f1f5f9"/>
      <rect x="452" y="0" width="56" height="56" rx="10" fill="#f1f5f9"/>

      <text class="day biz" x="30"  y="37" text-anchor="middle">22</text>
      <text class="day biz" x="105" y="37" text-anchor="middle">23</text>
      <text class="day off" x="180" y="37" text-anchor="middle">24</text>
      <text class="day biz" x="255" y="37" text-anchor="middle">25</text>
      <text class="day biz" x="330" y="37" text-anchor="middle">26</text>
      <text class="day off" x="405" y="37" text-anchor="middle">27</text>
      <text class="day off" x="480" y="37" text-anchor="middle">28</text>

      <text class="tag" x="180" y="70" text-anchor="middle">holiday</text>
      <text class="tag" x="405" y="70" text-anchor="middle">weekend</text>
      <text class="tag" x="480" y="70" text-anchor="middle">weekend</text>
    </g>
  </g>
</svg>
