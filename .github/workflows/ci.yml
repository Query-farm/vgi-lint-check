name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.7"
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --dev

      - name: Ruff lint
        run: uv run ruff check src tests scripts

      - name: Ruff format check
        run: uv run ruff format --check src tests scripts

      - name: mypy (strict)
        run: uv run mypy

      - name: pydoclint
        run: uv run pydoclint src/vgi_lint_check

      - name: Run tests (offline; live worker tests are skipped)
        run: uv run pytest -q

      - name: Check RULES.md is up to date
        run: uv run python scripts/gen_rules_doc.py --check

  build:
    # Smoke-build the distribution so packaging breaks are caught on PRs too.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.7"
      - run: uv build
      - run: uv run --with twine twine check dist/*
