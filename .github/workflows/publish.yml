name: Publish

# Build and publish to PyPI when a GitHub Release is published.
# Uses PyPI Trusted Publishing (OIDC) — no API token secret required.
# Set up once on PyPI: Project (or "pending publisher") -> Publishing ->
#   Owner: Query-farm, Repo: vgi-lint-check, Workflow: publish.yml,
#   Environment: pypi
# See: https://docs.pypi.org/trusted-publishers/

on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.7"

      - name: Check the release tag matches the package version
        if: github.event_name == 'release'
        run: |
          version=$(grep -m1 '^version' pyproject.toml | sed -E 's/.*"([^"]+)".*/\1/')
          tag="${GITHUB_REF_NAME#v}"
          echo "package version: $version | release tag: $tag"
          if [ "$version" != "$tag" ]; then
            echo "::error::release tag '$tag' does not match pyproject version '$version'"
            exit 1
          fi

      - name: Build sdist and wheel
        run: uv build

      - name: Validate metadata
        run: uv run --with twine twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/vgi-lint-check
    permissions:
      id-token: write # required for Trusted Publishing (OIDC)
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
